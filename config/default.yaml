# Casterly Configuration
# Mac Studio Edition - Local-Only via Ollama

# ═══════════════════════════════════════════════════════════════════════════════
# PROVIDER CONFIGURATION (Local Only)
# ═══════════════════════════════════════════════════════════════════════════════

local:
  provider: ollama
  model: gpt-oss:120b            # Primary model: native tool use + strong reasoning
  codingModel: qwen3-coder-next:latest  # Coding-specific model
  baseUrl: http://localhost:11434
  timeoutMs: 120000             # 70B models need longer timeout
  # Hardware: Mac Studio M4 Max with 128GB unified memory

# ═══════════════════════════════════════════════════════════════════════════════
# SENSITIVITY DETECTION
# ═══════════════════════════════════════════════════════════════════════════════

sensitivity:
  # These categories ALWAYS route locally, regardless of LLM classification
  alwaysLocal:
    - calendar      # Schedules, appointments, meetings
    - finances      # Bank accounts, SSN, credit cards, transactions
    - voice_memos   # Personal audio recordings
    - health        # Medical info, prescriptions, symptoms
    - credentials   # Passwords, API keys, tokens, secrets
    - documents     # Private notes, journals, contracts
    - contacts      # Personal relationships, phone numbers, addresses
    - location      # GPS data, home/work addresses

# ═══════════════════════════════════════════════════════════════════════════════
# SESSION MANAGEMENT
# ═══════════════════════════════════════════════════════════════════════════════

session:
  scope: per-peer               # Options: main, per-peer, per-channel
  maxHistoryMessages: 50        # Messages to keep in memory
  dailyResetHour: 4             # Reset sessions at 4 AM (null to disable)
  basePath: ~/.casterly/sessions

# ═══════════════════════════════════════════════════════════════════════════════
# TOOLS CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

tools:
  # Native tool use is enabled by default
  enabled: true
  maxIterations: 5              # Max tool call loops per request

  # Bash tool safety settings
  bash:
    autoApprove: false          # Set true for non-interactive mode
    blockedPatterns:
      - "rm -rf /"
      - ":(){ :|:& };:"         # Fork bomb
      - "dd if=/dev/"
      - "> /dev/sd"
      - "mkfs"
      - "chmod -R 777 /"

# ═══════════════════════════════════════════════════════════════════════════════
# SKILLS
# ═══════════════════════════════════════════════════════════════════════════════

skills:
  # Paths to search for SKILL.md files
  paths:
    - ~/.casterly/workspace/skills
    - ./skills
  # Skills can define native tools in their frontmatter

# ═══════════════════════════════════════════════════════════════════════════════
# LOGGING
# ═══════════════════════════════════════════════════════════════════════════════

logging:
  level: info                   # Options: debug, info, warn, error
  redactSensitive: true         # Always redact sensitive content in logs
  # Never log raw user content - use safe-logger module

# ═══════════════════════════════════════════════════════════════════════════════
# HARDWARE (Phase 5: Hardware Maximization)
# ═══════════════════════════════════════════════════════════════════════════════

hardware:
  concurrent_inference: true
  test_time_scaling: true
  adversarial_testing: true
  max_parallel_generations: 4
  bestofn_judge_model: hermes3:70b
