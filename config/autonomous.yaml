# Autonomous Self-Improvement Configuration
# Mac Studio Edition - Local Ollama Only
# See docs/autonomous-improvement.md for full documentation

# ═══════════════════════════════════════════════════════════════════════════════
# CORE SETTINGS
# ═══════════════════════════════════════════════════════════════════════════════

autonomous:
  # The autonomous loop is always active. There is no master switch.
  # Autonomy is the default state (see docs/vision.md).

  # Provider: Always ollama (local inference)
  provider: ollama
  model: qwen3-coder-next:latest  # Coding model for code analysis and implementation

  # ─────────────────────────────────────────────────────────────────────────────
  # TIMING
  # ─────────────────────────────────────────────────────────────────────────────

  # How often to run improvement cycles (in minutes)
  cycle_interval_minutes: 60

  # Maximum cycles per day (to manage costs and avoid runaway)
  max_cycles_per_day: 12

  # Quiet hours — scheduling preference, not a hard gate.
  # The LLM prefers consolidation work during quiet hours but the
  # system never refuses to run cycles. See docs/vision.md.
  quiet_hours:
    enabled: true
    start: "06:00"   # 6 AM — quiet starts (prefer consolidation)
    end: "22:00"     # 10 PM — quiet ends (normal priority work)

  # ─────────────────────────────────────────────────────────────────────────────
  # SCOPE
  # ─────────────────────────────────────────────────────────────────────────────

  # How many hypotheses to attempt per cycle
  max_attempts_per_cycle: 3

  # Maximum files a single change can modify
  max_files_per_change: 5

  # Directories allowed for modification
  allowed_directories:
    - src/
    - skills/
    - scripts/
    - tests/
    - config/

  # Patterns that should never be modified
  forbidden_patterns:
    - "**/*.env*"
    - "**/credentials*"
    - "**/secrets*"
    - "**/.git/**"

  # ─────────────────────────────────────────────────────────────────────────────
  # BACKLOG
  # ─────────────────────────────────────────────────────────────────────────────

  # Path to feature backlog file (relative to project root)
  backlog_path: config/backlog.yaml

  # ─────────────────────────────────────────────────────────────────────────────
  # CONFIDENCE THRESHOLDS
  # ─────────────────────────────────────────────────────────────────────────────

  # Minimum confidence to auto-integrate without review
  auto_integrate_threshold: 0.9

  # Minimum confidence to even attempt a hypothesis
  attempt_threshold: 0.5

  # ─────────────────────────────────────────────────────────────────────────────
  # RESOURCE LIMITS
  # ─────────────────────────────────────────────────────────────────────────────

  # Maximum age of a feature branch before cleanup
  max_branch_age_hours: 24

  # Maximum concurrent auto/ branches
  max_concurrent_branches: 3

  # Timeout for sandbox operations
  sandbox_timeout_seconds: 300

  # Memory limit for sandbox
  sandbox_memory_mb: 2048

  # ─────────────────────────────────────────────────────────────────────────────
  # BUDGET (Not applicable for local inference)
  # ─────────────────────────────────────────────────────────────────────────────
  # Local inference has no per-token cost
  # budget: null

# ═══════════════════════════════════════════════════════════════════════════════
# AGENT LOOP (Phase 2: ReAct)
# ═══════════════════════════════════════════════════════════════════════════════

agent_loop:
  # The agent loop is the sole execution path. There is no legacy
  # fallback. See docs/vision.md.

  # Maximum reasoning turns per cycle (safety ceiling)
  max_turns: 200

  # Soft limit on estimated tokens per cycle (input + output)
  # Local inference has no cost — set high to allow deep reflection.
  max_tokens_per_cycle: 500000

  # Moderate budget for background (scheduled/event) cycles
  max_tokens_per_cycle_background: 100000

  # Model used for reasoning / planning / decision-making
  reasoning_model: qwen3.5:122b

  # Model used for code generation and analysis
  coding_model: qwen3-coder-next:latest

  # Enable the 'think' tool for explicit reasoning steps
  think_tool_enabled: true

  # Enable delegation to sub-models
  delegation_enabled: true

  # Temperature for the reasoning model
  temperature: 0.2

  # Maximum tokens per individual LLM response
  max_response_tokens: 4096

# ═══════════════════════════════════════════════════════════════════════════════
# DUAL-LOOP ARCHITECTURE (Three-model concurrent system)
# ═══════════════════════════════════════════════════════════════════════════════

dual_loop:
  # When enabled, the dual-loop coordinator replaces the single agent loop
  # as the primary execution path for user messages. The agent loop is still
  # used internally by the DeepLoop for ReAct execution.
  enabled: false   # Set to true to activate dual-loop mode

  # FastLoop settings (27B model — triage, review, delivery)
  fast:
    heartbeat_ms: 2000
    triage_timeout_ms: 10000
    max_conversation_tokens: 10000
    review_enabled: true
    message_coalesce_ms: 3000

  # DeepLoop settings (122B model — planning, execution)
  deep:
    model: qwen3.5:122b
    coder_model: qwen3-coder-next:latest
    max_turns_per_task: 50
    max_revision_rounds: 3
    preempt_check_interval_turns: 5
    idle_sleep_ms: 10000

  # TaskBoard persistence
  task_board:
    path: ~/.casterly/taskboard.json
    archive_after_days: 7
    max_active_tasks: 10

  # Context tier configuration (num_ctx per operation type)
  context_tiers:
    fast:
      compact: 4096
      standard: 12288
      extended: 24576
      review_large_threshold_lines: 150
    deep:
      compact: 8192
      standard: 24576
      extended: 40960
      context_pressure_warning_threshold: 0.80
    coder:
      compact: 8192
      standard: 16384
      extended: 32768
      response_buffer_tokens: 2000

  # Coordinator settings
  max_restart_attempts: 3
  restart_delay_ms: 5000
  save_interval_ms: 30000
  archive_interval_ms: 3600000

# ═══════════════════════════════════════════════════════════════════════════════
# EVENTS (Phase 3: Event-Driven Awareness)
# ═══════════════════════════════════════════════════════════════════════════════

events:
  # Watchers always run and emit events. The LLM decides what to do
  # with them. There is no master switch. See docs/vision.md.

  # ─────────────────────────────────────────────────────────────────────────────
  # FILE WATCHER
  # ─────────────────────────────────────────────────────────────────────────────
  file_watcher:
    enabled: true
    # Directories to watch for file changes (relative to project root)
    paths:
      - src/
      - tests/
      - config/
    # Glob patterns to ignore (never trigger on these)
    ignore_patterns:
      - "**/node_modules/**"
      - "**/.git/**"
      - "**/dist/**"
      - "**/*.log"
    # Debounce window in milliseconds (batch rapid changes)
    debounce_ms: 500

  # ─────────────────────────────────────────────────────────────────────────────
  # GIT WATCHER
  # ─────────────────────────────────────────────────────────────────────────────
  git_watcher:
    enabled: true
    # How often to poll .git/refs for changes (milliseconds)
    poll_interval_ms: 5000
    # Debounce window for ref changes
    debounce_ms: 1000

  # ─────────────────────────────────────────────────────────────────────────────
  # ISSUE WATCHER
  # ─────────────────────────────────────────────────────────────────────────────
  issue_watcher:
    enabled: true
    # How often to check for stale issues (milliseconds)
    # Default: 6 hours (21600000)
    check_interval_ms: 21600000
    # Days without activity before an issue is considered stale
    stale_days: 7

  # ─────────────────────────────────────────────────────────────────────────────
  # THROTTLING
  # ─────────────────────────────────────────────────────────────────────────────

  # Minimum seconds between event-triggered cycles (prevents thrashing)
  cooldown_seconds: 120

  # Maximum agent loop turns per day from event-triggered cycles
  daily_budget_turns: 200

# ═══════════════════════════════════════════════════════════════════════════════
# TIERED MEMORY (Phase 4: MemGPT-style context management)
# ═══════════════════════════════════════════════════════════════════════════════

memory_tiers:
  # Hot tier: identity prompt, always in context (~4k tokens)
  hot_tier_max_tokens: 2000

  # Warm tier: working memory for current cycle (~20k tokens)
  warm_tier_max_tokens: 10000

  # Overall context window size in tokens
  context_window_tokens: 40960

  # ─────────────────────────────────────────────────────────────────────────────
  # COOL/COLD STORAGE
  # ─────────────────────────────────────────────────────────────────────────────

  # Base path for persistent memory storage
  store_base_path: ~/.casterly/memory

  # Maximum entries in the cool tier before oldest are promoted to cold
  max_cool_entries: 200

  # Days before cool entries are promoted to cold tier
  cool_retention_days: 30

  # Default number of results from recall searches
  default_search_limit: 10

  # Path to existing reflections directory (cold tier integration)
  reflections_path: ~/.casterly/autonomous/reflections

# ═══════════════════════════════════════════════════════════════════════════════
# HARDWARE MAXIMIZATION (Phase 5: concurrent inference + test-time scaling)
# ═══════════════════════════════════════════════════════════════════════════════

hardware:
  # Concurrent inference across multiple models
  concurrent_inference: true
  max_concurrent_requests: 3

  # Test-time compute scaling (difficulty-adaptive reasoning)
  test_time_scaling: true
  max_parallel_generations: 4

  # Adversarial self-testing after code generation
  adversarial_testing: true
  max_adversarial_test_cases: 10
  adversarial_attack_temperature: 0.7

  # Best-of-N judging model
  bestofn_judge_model: qwen3.5:122b

# ═══════════════════════════════════════════════════════════════════════════════
# DREAM CYCLES (Phase 6: quiet-hours strategic consolidation)
# ═══════════════════════════════════════════════════════════════════════════════

dream_cycles:
  # Dream cycles are low-priority goals the LLM pursues when no
  # higher-priority triggers are pending. No toggle. See docs/vision.md.

  # Hours between consolidation runs
  consolidation_interval_hours: 24

  # Maximum turns for the exploration phase
  exploration_budget_turns: 50

  # Hours between self-model rebuilds
  self_model_rebuild_interval_hours: 48

  # Days to look back for code archaeology
  archaeology_lookback_days: 90

  # Days between retrospective writes
  retrospective_interval_days: 7

# ═══════════════════════════════════════════════════════════════════════════════
# SELF-KNOWLEDGE (Vision Tier 1: Crystals, Constitution, Traces)
# ═══════════════════════════════════════════════════════════════════════════════

self_knowledge:
  # ─────────────────────────────────────────────────────────────────────────────
  # MEMORY CRYSTALLIZATION
  # ─────────────────────────────────────────────────────────────────────────────
  crystals:
    # Path to crystal store
    path: ~/.casterly/crystals.yaml

    # Maximum number of crystals
    max_crystals: 30

    # Token budget for crystals in the hot tier
    budget_tokens: 500

    # Minimum confidence to keep a crystal during pruning
    min_confidence: 0.3

  # ─────────────────────────────────────────────────────────────────────────────
  # CONSTITUTIONAL SELF-GOVERNANCE
  # ─────────────────────────────────────────────────────────────────────────────
  constitution:
    # Path to constitution store
    path: ~/.casterly/constitution.yaml

    # Maximum number of rules
    max_rules: 50

    # Token budget for constitution in the hot tier
    budget_tokens: 500

    # Minimum confidence to keep a rule during pruning
    min_confidence: 0.3

  # ─────────────────────────────────────────────────────────────────────────────
  # SELF-DEBUGGING REPLAY
  # ─────────────────────────────────────────────────────────────────────────────
  traces:
    # Base path for trace storage
    path: ~/.casterly/traces

    # Days to retain successful traces
    success_retention_days: 7

    # Days to retain failed traces
    failure_retention_days: 30

    # Maximum number of traces to keep
    max_traces: 500

# ═══════════════════════════════════════════════════════════════════════════════
# VISION TIER TOGGLES
# ═══════════════════════════════════════════════════════════════════════════════

# Controls which self-improvement subsystems are active. When a tier is
# disabled, the corresponding agent tools gracefully return "not enabled".
# Presence of the self_improvement / advanced_self_improvement sections
# below automatically enables their respective tier.
#
# vision_tiers:
#   tier2: true   # prompt-store, shadow-store, tool-synthesizer
#   tier3: true   # challenges, prompt-evolution, LoRA training

# ═══════════════════════════════════════════════════════════════════════════════
# SELF-IMPROVEMENT TIER 2 (Vision: Prompts, Shadows, Tool Synthesis)
# ═══════════════════════════════════════════════════════════════════════════════

self_improvement:
  # ─────────────────────────────────────────────────────────────────────────────
  # SELF-MODIFYING PROMPTS
  # ─────────────────────────────────────────────────────────────────────────────
  prompts:
    # Path to the editable system prompt
    system_prompt_path: ~/.casterly/system-prompt.md

    # Path to version history
    versions_path: ~/.casterly/prompt-versions.json

    # Maximum versions to retain
    max_versions: 20

    # Protected patterns that can never be removed from the prompt
    protected_patterns:
      - "Safety Boundary"
      - "Path Guards"
      - "Redaction Rules"
      - "Security Invariants"
      - "NEVER"
      - "non-negotiable"

  # ─────────────────────────────────────────────────────────────────────────────
  # SHADOW EXECUTION
  # ─────────────────────────────────────────────────────────────────────────────
  shadows:
    # Path to shadow analysis store
    analysis_path: ~/.casterly/shadow-analysis.json

    # Maximum shadows to retain
    max_shadows: 200

    # Minimum scenarios needed to form a judgment pattern
    min_scenarios_for_pattern: 5

    # Days to retain assessed shadows
    retention_days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # TOOL SYNTHESIS
  # ─────────────────────────────────────────────────────────────────────────────
  tools:
    # Directory for synthesized tool definitions
    tools_directory: ~/.casterly/tools

    # Maximum number of custom tools
    max_tools: 20

    # Maximum template body length in characters
    max_template_length: 2000

    # Days before unused tools are flagged for archival
    unused_days_threshold: 30

# ═══════════════════════════════════════════════════════════════════════════════
# SELF-IMPROVEMENT TIER 3 (Vision: Adversarial Testing, Prompt Evolution, LoRA)
# ═══════════════════════════════════════════════════════════════════════════════

advanced_self_improvement:
  # ─────────────────────────────────────────────────────────────────────────────
  # ADVERSARIAL DUAL-MODEL SELF-TESTING
  # ─────────────────────────────────────────────────────────────────────────────
  adversarial:
    # Maximum challenges per dream cycle batch
    challenge_budget: 20

    # Prioritize weakest skills from self-model
    prioritize_weak_skills: true

    # Challenge types to generate
    challenge_types:
      - code_completion
      - bug_detection
      - regex_construction
      - refactoring_decision
      - security_review

    # Time limit per challenge in seconds
    default_time_limit_seconds: 60

    # Path to challenge evaluation history
    history_path: ~/.casterly/challenge-history.json

    # Maximum batch records to keep
    max_batch_records: 50

  # ─────────────────────────────────────────────────────────────────────────────
  # PROMPT GENETIC ALGORITHM
  # ─────────────────────────────────────────────────────────────────────────────
  prompt_evolution:
    # Directory for prompt variants
    variants_path: ~/.casterly/prompt-evolution

    # Population size (number of variant prompts)
    population_size: 8

    # Mutation rate (0.0-1.0)
    mutation_rate: 0.3

    # Crossover rate (0.0-1.0)
    crossover_rate: 0.7

    # Keep current best in next generation (elite strategy)
    elite_strategy: true

    # Maximum generation records to keep
    max_generation_history: 50

  # ─────────────────────────────────────────────────────────────────────────────
  # LOCAL FINE-TUNING AND LoRA ADAPTERS
  # ─────────────────────────────────────────────────────────────────────────────
  lora_training:
    # Directory for adapter files
    adapters_path: ~/.casterly/adapters

    # Directory for benchmark tasks
    benchmarks_path: ~/.casterly/benchmarks

    # Maximum adapters to maintain
    max_adapters: 20

    # Minimum improvement threshold to keep adapter (e.g., 0.05 = +5%)
    min_improvement_threshold: 0.05

    # Training data lookback in days
    training_data_lookback_days: 90

    # Default LoRA configuration
    lora:
      rank: 8
      alpha: 16
      target_modules:
        - q_proj
        - v_proj
      learning_rate: 0.0001
      epochs: 3
      batch_size: 8
      format: instruction_completion

    # Number of benchmark tasks per evaluation
    eval_sample_size: 10

# ═══════════════════════════════════════════════════════════════════════════════
# COMMUNICATION (proactive user messaging via MessagePolicy + delivery)
# ═══════════════════════════════════════════════════════════════════════════════

communication:
  # Master switch — enable proactive user messaging.
  # When true, the message_user agent tool routes through MessagePolicy
  # (throttle, quiet hours, event filtering) and the configured delivery
  # backend. When false, message_user returns "not configured".
  enabled: false

  # Delivery channel: 'imessage' or 'console'
  # imessage: sends via the iMessage sender (requires macOS + Messages app)
  # console: writes to ~/.casterly/outbox.jsonl for later review
  delivery_channel: console

  # Recipient for iMessage delivery (phone number or Apple ID)
  # Required when delivery_channel is 'imessage'. Ignored for 'console'.
  recipient: null

  # Throttle settings
  throttle:
    max_per_hour: 3
    max_per_day: 10
    quiet_hours: true
    quiet_start: "22:00"
    quiet_end: "08:00"

  # Only notify about test failures Tyrion can't fix himself
  test_failure_min_severity: unresolvable   # 'always' or 'unresolvable'

  # Enable daily summary notifications
  daily_summary_enabled: true

# ═══════════════════════════════════════════════════════════════════════════════
# VOICE FILTER (post-processing personality rewrite)
# ═══════════════════════════════════════════════════════════════════════════════

# Rewrites the agent's stock response in Tyrion's voice as the last step
# before sending via iMessage. The agent loop reasons with full clarity
# (no persona overhead), then this filter transforms the user-facing text.
# On any failure (timeout, Ollama down), falls back to the raw response.

voice_filter:
  enabled: true
  model: qwen3.5:122b          # Same as primary/reasoning model
  max_tokens: 512               # Responses should be same length or shorter
  temperature: 0.7              # Natural variation in voice
  timeout_ms: 30000             # 30s timeout — falls back to raw on failure

# ═══════════════════════════════════════════════════════════════════════════════
# GIT CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════════

git:
  # Remote to push to
  remote: origin

  # Base branch for all improvements
  base_branch: main

  # Prefix for auto-generated branches
  branch_prefix: "auto/"

  # Integration strategy: "approval_required" (default), "direct", or "pull_request"
  # approval_required: validates on branch, leaves for owner review via morning summary
  # direct: merges to main automatically after validation (no human review — use with caution)
  # pull_request: creates a GitHub PR (requires gh CLI)
  integration_mode: approval_required

  # No approval timeout — branches stay alive until owner reviews them
  # Owner merges at their leisure via "merge auto/hyp-xxx" command

  # Pull request settings (if integration_mode: pull_request)
  pull_request:
    auto_merge: false
    require_ci: true
    labels:
      - autonomous
      - auto-generated
    reviewers: []  # Add GitHub usernames if you want review
    draft: false

  # Sync behavior
  fetch_before_cycle: true
  push_after_integrate: true

  # Cleanup settings
  cleanup:
    delete_merged_branches: true
    delete_failed_branches: true
    max_stale_branch_age_hours: 48

# ═══════════════════════════════════════════════════════════════════════════════
# SAFETY INVARIANTS
# ═══════════════════════════════════════════════════════════════════════════════

invariants:
  - name: quality_gates
    check: "npm run check"
    description: "All quality gates must pass"

  - name: no_type_errors
    check: "npm run typecheck"
    description: "TypeScript compilation must succeed"

  - name: tests_pass
    check: "npm run test"
    description: "All tests must pass"

  - name: protected_paths
    check: "node scripts/guardrails.mjs"
    description: "Protected paths must remain unchanged"

# ═══════════════════════════════════════════════════════════════════════════════
# REFLECTION STORAGE
# ═══════════════════════════════════════════════════════════════════════════════

reflection:
  # Where to store reflection logs
  path: ~/.casterly/autonomous/reflections/
  format: jsonl
  retain_days: 90

  # Also write significant learnings to MEMORY.md
  summary_to_memory: true

# ═══════════════════════════════════════════════════════════════════════════════
# NOTIFICATIONS (Optional)
# ═══════════════════════════════════════════════════════════════════════════════

notifications:
  enabled: false
  on_success: false
  on_failure: true
  on_revert: true
  method: imessage
  recipient: null  # Set to your phone number or Apple ID
