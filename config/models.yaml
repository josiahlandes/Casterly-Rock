# Casterly Model Configuration
# Mac Studio M4 Max Edition - Local Ollama Only
#
# All models run locally via Ollama. No cloud APIs.
# Two-model architecture: 122b (81 GB) + 35b-a3b (24 GB) = ~105 GB of 128 GB.
# KV cache at 262K context with q8_0 adds ~8-10 GB → ~115 GB total, ~13 GB headroom.

models:
  # Coding tasks: code generation, refactoring, bug fixes
  # The 122b matches dedicated coding models on benchmarks (72.0 SWE-bench).
  coding:
    provider: ollama
    model: qwen3.5:122b
    context_length: 262144
    temperature: 0.1  # Low for code accuracy
    keep_alive: -1    # Never unload (always-hot)
    fallback: null  # This is the primary model

  # Primary/General: reasoning, planning, conversation
  primary:
    provider: ollama
    model: qwen3.5:122b
    context_length: 262144
    temperature: 0.6  # Balanced for tool use + reasoning
    keep_alive: -1    # Never unload (always-hot)
    fallback: null  # No fallback - this is the fallback

  # Autonomous improvement cycles
  autonomous:
    provider: ollama
    model: qwen3.5:122b
    context_length: 262144
    temperature: 0.2  # Slightly higher for exploration
    keep_alive: -1    # Never unload (always-hot)
    fallback: null

  # Fast model: triage, review, acknowledgment (dual-loop FastLoop)
  # MoE: 35B total params, 3B active — blazing fast inference for triage.
  fast:
    provider: ollama
    model: qwen3.5:35b-a3b
    context_length: 24576   # Extended tier max
    temperature: 0.1  # Low for triage accuracy
    keep_alive: -1    # Never unload — always-hot for <2s responses
    fallback: qwen3.5:122b

  # Future: specialist model from self-distillation (Phase 6)
  specialist:
    provider: ollama
    model: tyrion-specialist:latest
    context_length: 32768
    temperature: 0.2
    keep_alive: -1
    enabled: false    # Enabled after first training run

# Task-to-model routing
routing:
  # Coding interface modes (from src/coding/modes/)
  code: coding
  architect: primary
  ask: primary
  review: coding

  # Autonomous tasks
  analyze: primary
  hypothesize: primary
  implement: coding
  validate: coding
  reflect: primary

  # Dual-loop tasks
  triage: fast
  acknowledge: fast

# Hardware constraints (Phase 5: maximization)
hardware:
  platform: mac-studio-m4-max
  memory_gb: 128
  max_concurrent_models: 2  # Two-model architecture: 122b + 35b-a3b
  target_memory_usage_pct: 91  # ~117 GB of 128 GB (incl. 131K KV cache), ~11 GB headroom

# Ollama settings (FastLoop only — DeepLoop runs on MLX)
ollama:
  base_url: http://localhost:11434
  timeout_ms: 60000          # 1 minute — FastLoop triage/relay tasks are quick
  keep_alive: -1              # Never unload — FastLoop model stays hot

# MLX settings (Apple Silicon-native inference via vllm-mlx)
# DeepLoop always runs on MLX (~2.5x faster decode than Ollama Metal).
# Server: scripts/mlx-server.sh start (auto-started by daemon/REPL if needed).
mlx:
  base_url: http://localhost:8000
  # DeepLoop model: text-only 122B for reasoning/coding via MLX.
  # The mlx-community variant includes vision towers that fail to load in
  # text-only mlx_lm paths; use the nightmedia text-only variant instead.
  model: nightmedia/Qwen3.5-122B-A10B-Text-mxfp4-mlx
  timeout_ms: 1800000          # 30 minutes — coding tasks at 131K context

  # Architecture: 48 layers (12 full attention + 36 linear attention)
  # Only the 12 full attention layers use standard KV cache.
  # 2 KV heads, head_dim=256. Model weights: ~65 GB at MXFP4.
  architecture:
    n_layers: 48
    n_kv_layers: 12
    n_kv_heads: 2
    head_dim: 256

  # Speculative decoding: draft model generates candidate tokens, main model verifies.
  # 1.5-2x speedup with zero quality loss (mathematically identical output distribution).
  # Enable by passing --spec to scripts/mlx-server.sh.
  speculative_decoding:
    draft_model: mlx-community/Qwen3.5-0.5B-MLX-4bit
    num_speculative_tokens: 5

  # KVSplit K8V4: asymmetric KV cache quantization (keys=8-bit, values=4-bit).
  # ~62.5% KV cache memory reduction vs FP16, ~25% vs Q8. Minimal quality loss.
  # Keys are more sensitive to quantization than values — hence the asymmetry.
  #
  # Implementation: mlx_lm's QuantizedKVCache supports uniform quantization
  # only (same bits for K and V). K8V4 uses a custom K8V4KVCache class that
  # applies different bits. vllm-mlx serve does NOT have --kv-cache-* flags;
  # the quantization is configured via mlx_lm's generate_step(kv_bits=...)
  # for uniform, or by injecting the custom cache class for K8V4.
  #
  # Reference: KIVI (Liu et al., 2024), KVQuant (Hooper et al., 2024)
  kv_split:
    enabled: true
    key_bits: 8
    value_bits: 4
    group_size: 64
    min_context_for_split: 8192   # Only apply for context lengths >= 8K
    max_perplexity_degradation: 0.1
    quality_monitoring: true
    auto_disable_on_degradation: true

# ANE/NPU settings (Apple Neural Engine offloading)
# Offloads embeddings and classification to ANE — 19 TFLOPS at 2.8W.
# Frees GPU entirely for main inference models.
# Requires CoreML bridge server (scripts/ane-bridge.sh).
# See docs/roadmap.md Tier 4, Item 11.
ane:
  enabled: true
  bridge_host: 127.0.0.1
  bridge_port: 8100
  embedding_model: nomic-embed-text-ane
  classification_model: task-classifier-ane
  embedding_dimensions: 768
  cache_size: 1024
  timeout_ms: 5000
