# Casterly Model Configuration
# Mac Studio M4 Max Edition - Local Ollama Only
#
# All models run locally via Ollama. No cloud APIs.
# With 128GB unified memory, can run multiple 70B models simultaneously.

models:
  # Coding tasks: code generation, refactoring, bug fixes
  coding:
    provider: ollama
    model: qwen3-coder-next:latest
    context_length: 32768
    temperature: 0.1  # Low for code accuracy
    fallback: hermes3:70b

  # Primary/General: reasoning, planning, conversation
  primary:
    provider: ollama
    model: hermes3:70b
    context_length: 32768
    temperature: 0.7  # Higher for creative reasoning
    fallback: null  # No fallback - this is the fallback

  # Autonomous improvement cycles
  autonomous:
    provider: ollama
    model: qwen3-coder-next:latest
    context_length: 32768
    temperature: 0.2  # Slightly higher for exploration
    fallback: hermes3:70b

# Task-to-model routing
routing:
  # Coding interface modes (from src/coding/modes/)
  code: coding
  architect: primary
  ask: primary
  review: coding

  # Autonomous tasks
  analyze: primary
  hypothesize: primary
  implement: coding
  validate: coding
  reflect: primary

# Hardware constraints
hardware:
  platform: mac-studio-m4-max
  memory_gb: 128
  max_concurrent_models: 2  # Can run 2x 70B models at Q4

# Ollama settings
ollama:
  base_url: http://localhost:11434
  timeout_ms: 300000  # 5 minutes for long generations
  keep_alive: 5m      # Keep model loaded
