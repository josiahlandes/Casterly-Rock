# Casterly Model Configuration
# Mac Studio M4 Max Edition - Local Ollama Only
#
# All models run locally via Ollama. No cloud APIs.
# Two-model architecture: 122b (81 GB) + 35b-a3b (24 GB) = ~105 GB of 128 GB.
# KV cache at 262K context with q8_0 adds ~8-10 GB → ~115 GB total, ~13 GB headroom.

models:
  # Coding tasks: code generation, refactoring, bug fixes
  # The 122b matches dedicated coding models on benchmarks (72.0 SWE-bench).
  coding:
    provider: ollama
    model: qwen3.5:122b
    context_length: 262144
    temperature: 0.1  # Low for code accuracy
    keep_alive: -1    # Never unload (always-hot)
    fallback: null  # This is the primary model

  # Primary/General: reasoning, planning, conversation
  primary:
    provider: ollama
    model: qwen3.5:122b
    context_length: 262144
    temperature: 0.6  # Balanced for tool use + reasoning
    keep_alive: -1    # Never unload (always-hot)
    fallback: null  # No fallback - this is the fallback

  # Autonomous improvement cycles
  autonomous:
    provider: ollama
    model: qwen3.5:122b
    context_length: 262144
    temperature: 0.2  # Slightly higher for exploration
    keep_alive: -1    # Never unload (always-hot)
    fallback: null

  # Fast model: triage, review, acknowledgment (dual-loop FastLoop)
  # MoE: 35B total params, 3B active — blazing fast inference for triage.
  fast:
    provider: ollama
    model: qwen3.5:35b-a3b
    context_length: 24576   # Extended tier max
    temperature: 0.1  # Low for triage accuracy
    keep_alive: -1    # Never unload — always-hot for <2s responses
    fallback: qwen3.5:122b

  # Future: specialist model from self-distillation (Phase 6)
  specialist:
    provider: ollama
    model: tyrion-specialist:latest
    context_length: 32768
    temperature: 0.2
    keep_alive: -1
    enabled: false    # Enabled after first training run

# Task-to-model routing
routing:
  # Coding interface modes (from src/coding/modes/)
  code: coding
  architect: primary
  ask: primary
  review: coding

  # Autonomous tasks
  analyze: primary
  hypothesize: primary
  implement: coding
  validate: coding
  reflect: primary

  # Dual-loop tasks
  triage: fast
  code_review: fast
  acknowledge: fast

# Hardware constraints (Phase 5: maximization)
hardware:
  platform: mac-studio-m4-max
  memory_gb: 128
  max_concurrent_models: 2  # Two-model architecture: 122b + 35b-a3b
  target_memory_usage_pct: 91  # ~117 GB of 128 GB (incl. 131K KV cache), ~11 GB headroom

# Ollama settings
ollama:
  base_url: http://localhost:11434
  timeout_ms: 600000         # 10 minutes — default for all tasks
  coding_timeout_ms: 1800000 # 30 minutes — coding tasks (multi-file generation can be slow at 131K context)
  keep_alive: -1              # Never unload — both models stay hot

  # KV cache quantization: set via OLLAMA_KV_CACHE_TYPE env var (not an Ollama API param).
  # q8_0 = ~50% KV memory reduction with negligible quality loss (< 0.1 perplexity).
  # q4_0 = ~75% reduction but may degrade quality on long contexts.
  # Set by scripts/setup-mac.sh and scripts/tyrion-daemon.sh.
  # Reference: KVQuant (Hooper et al., 2024)
  kv_cache_type: q8_0

# MLX settings (Apple Silicon-native inference via vllm-mlx)
# Achieves 50-87% faster inference than Ollama for large dense models.
# Activate by setting CASTERLY_DEEP_PROVIDER=mlx before starting the daemon.
# See scripts/mlx-server.sh for server launch.
mlx:
  base_url: http://localhost:8000
  # Use a text-only model by default. Some 122B variants include vision
  # towers and fail to load in current vllm-mlx text server paths.
  model: mlx-community/Qwen3-Coder-30B-A3B-Instruct-4bit
  timeout_ms: 1800000          # 30 minutes — same budget as Ollama coding tasks

  # Speculative decoding: draft model generates candidate tokens, main model verifies.
  # 1.5-2x speedup with zero quality loss (mathematically identical output distribution).
  # Enable by passing --spec to scripts/mlx-server.sh.
  speculative_decoding:
    draft_model: mlx-community/Qwen3.5-0.5B-MLX-4bit
    num_speculative_tokens: 5  # Tokens per speculation step (higher = faster but lower acceptance rate)
