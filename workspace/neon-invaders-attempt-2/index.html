<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Invaders</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>
        <div id="ui-layer">
            <div id="start-screen" class="screen">
                <h1 class="neon-title">NEON INVADERS</h1>
                <p class="subtitle">Defend Earth from the alien armada</p>
                <div class="instructions">
                    <p>← → or A/D to move</p>
                    <p>SPACE to shoot</p>
                    <p>P to pause</p>
                </div>
                <button id="start-btn" class="neon-btn">START GAME</button>
            </div>
            <div id="game-over-screen" class="screen hidden">
                <h1 class="neon-title">GAME OVER</h1>
                <p>Final Score: <span id="final-score">0</span></p>
                <p>High Score: <span id="high-score">0</span></p>
                <button id="restart-btn" class="neon-btn">PLAY AGAIN</button>
            </div>
            <div id="pause-screen" class="screen hidden">
                <h1 class="neon-title">PAUSED</h1>
                <button id="resume-btn" class="neon-btn">RESUME</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
